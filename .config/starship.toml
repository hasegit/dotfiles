"$schema" = 'https://starship.rs/config-schema.json'
# ÔćČ
format = """
[‚ē≠‚ĒÄ](fg:light bg:none)\
[Óāĺ](fg:darkest bg:none)\
${custom.home}\
[Óāł](fg:darkest bg:dark)\
$directory\
[Óāł ](fg:dark bg:medium)\
$nodejs\
$lua\
$rust\
$golang\
$pulumi\
$azure\
[Óāł](fg:medium bg:none)\
$fill\
$status\
$cmd_duration\
$time\
\n\
[‚ēį‚ĒÄ](fg:light bg:none)\
$character\
 """

palette = "purple"

[palettes.purple]
darkest = "#8a44ff" 
dark    = "#9c61ff"
medium  = "#af7dff"
light   = "#d0bfff"
text = "#efefff"
text2 = "#8a44ff"

[fill]
symbol = '-'
style = 'light dimmed'

[custom.home]
style = "fg:text bg:darkest"
command = "$HOME/.config/zsh/functions/get_icon"
format = '[ $output ]($style)'
when = true

[directory]
style = "fg:text bg:dark"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Ôźė"
style = "fg:text bg:medium"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:medium"
format = '[$all_status ]($style)'
untracked = '[+${count}](bold fg:#ffccf0 bg:medium)'
modified = '[~${count}](bold fg:#e5dbff bg:medium)'
deleted = '[-${count}](bold fg:#ff9999 bg:medium)'
conflicted = '[!${count}](bold fg:#ff6666 bg:medium)'
staged = '[‚úď${count}](bold fg:#99ff99 bg:medium)'

[nodejs]
symbol = "Óīć "
style = "fg:#6E9E58 bg:medium"
format = '[$symbol$version ]($style)'

[lua]
symbol = "ůįĘĪ "
style = "fg:blue bg:medium"
format = '[$symbol$version ]($style)'

[rust]
symbol = "Óě® "
style = "fg:red bg:medium"
format = '[$symbol$version ]($style)'

[golang]
symbol = "Óėß "
style = "fg:text2 bg:medium"
format = '[$symbol$version ]($style)'

[pulumi]
symbol = "Ó°≥ "
style = "fg:#E27680 bg:medium"
format = '[$symbol$stack ]($style)'

[azure]
disabled = false
format = '[$symbol($subscription) ]($style)'
symbol = 'ůį†Ö '
style = "fg:blue bg:medium"

[status]
disabled = false
style = 'fg:#ff6699 bg:none'
format = '[ $common_meaning$signal_name\($int$signal_number\)]($style) '

[cmd_duration]
min_time = 1
style = "fg:dark bg:none"
format = '[ ůĪ¶ü $duration]($style)'

[time]
disabled = false
time_format = "%H:%M:%S"
style="fg:dark bg:none"
format = '[ Ôźļ  $time ]($style)'

[character]
success_symbol = '[>](fg:light)'
error_symbol = '[√ó](bold fg:#ff49a0)'
format = '$symbol '

