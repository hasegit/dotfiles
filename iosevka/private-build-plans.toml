[buildPlans.Hasevka]
family = "Hasevka"
spacing = "fontconfig-mono"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.Hasevka.variants]
inherits = "ss04"

[buildPlans.Hasevka.variants.design]
one = "no-base"
two = "curly-neck-serifless"
three = "flat-top-serifless"
four = "open-serifless"
five = "oblique-arched-serifless"
seven = "straight-serifless"
eight = "two-circles"
zero = "slashed"
capital-a = "straight-serifless"
capital-c = "serifless"
capital-d = "standard-serifless"
capital-g = "toothless-rounded-serifless-hooked"
capital-i = "short-serifed"
capital-j = "serifless"
capital-k = "symmetric-connected-serifless"
capital-m = "hanging-serifless"
capital-q = "crossing"
capital-r = "straight-open-serifless"
capital-u = "toothless-rounded-serifless"
capital-w = "straight-serifless"
capital-x = "straight-serifless"
capital-z = "straight-serifless-with-horizontal-crossbar"
a = "double-storey-toothless-rounded"
b = "toothless-rounded-serifless"
c = "serifless"
d = "toothless-rounded-serifless"
e = "flat-crossbar"
f = "flat-hook-tailed"
g = "single-storey-flat-hook-earless-rounded"
i = "flat-tailed"
j = "serifless"
k = "symmetric-connected-bottom-right-serifed"
l = "flat-tailed"
m = "earless-single-arch-serifless"
n = "earless-corner-straight-serifless"
p = "earless-rounded-serifless"
q = "earless-rounded-straight-serifless"
r = "earless-rounded-serifless"
t = "flat-hook"
u = "toothless-rounded-serifless"
v = "straight-serifless"
w = "rounded-vertical-sides-flat-top-serifless"
x = "straight-serifless"
y = "cursive-flat-hook-serifless"
z = "curly-serifless"
punctuation-dot = "round"
braille-dot = "square"
ascii-single-quote = "straight"
paren = "normal"
brace = "straight"
number-sign = "slanted"
ampersand = "closed"
at = "threefold"
dollar = "through"
question = "smooth"

[buildPlans.Hasevka.ligations]
inherits = "dlig"

[buildPlans.Hasevka.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Hasevka.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Hasevka.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Hasevka.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
